name = "gateway-worker"
main = "build/index.js"
compatibility_date = "2026-04-22"

[build]
command = "cargo install -q \"worker-build@^0.8\" && worker-build --release"

# Service binding: the gateway calls echo-worker via this binding name.
# Locally (miniflare) the binding is wired up programmatically; in
# production `wrangler deploy` reads this section.
[[services]]
binding = "ECHO"
service = "echo-worker"

# Durable Object namespace binding: the gateway calls EchoDO via a stub
# that gets cast to a Fetcher for use with FetcherTransport.
[durable_objects]
bindings = [
  { name = "ECHO_DO", class_name = "EchoDO", script_name = "echo-do-worker" }
]
